services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: euro-park-mssql

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      SQLCMDPASSWORD: "${MSSQL_SA_PASSWORD}"

    ports:
      - "14333:1433"

    volumes:
      - mssql_data:/var/opt/mssql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -C -l 3 -Q \"SELECT 1\" -b -o /dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    restart: unless-stopped

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: euro-park-mssql-init

    depends_on:
      mssql:
        condition: service_healthy

    environment:
      SQLCMDPASSWORD: "${MSSQL_SA_PASSWORD}"
      APP_DB_PASSWORD: "${DB_PASSWORD}"

    volumes:
      - ./infra/mssql/init:/scripts:ro

    entrypoint:
      - /bin/bash
      - -c

    command:
      - >
        /opt/mssql-tools18/bin/sqlcmd
        -S mssql
        -U sa
        -C
        -b
        -i /scripts/001_init.sql

    restart: "no"


volumes:
  mssql_data: